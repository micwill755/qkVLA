<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 820" role="img" aria-labelledby="title desc">
  <title id="title">GR00T N1.7 public architecture path</title>
  <desc id="desc">Detailed diagram of the public GR00T N1.7 action head: Cosmos Reason Qwen backbone, VLLN, optional VL self attention, state encoder, multi embodiment action encoder, AlternateVLDiT, category-specific action decoder, and flow matching loop.</desc>
  <rect width="1460" height="820" fill="#ffffff"/>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
    .box { fill:#f2f2f2; stroke:#3f4650; stroke-width:2; }
    .emb { fill:#d9ead3; stroke:#3f4650; stroke-width:2; }
    .vlm { fill:#e9edf7; stroke:#3f4650; stroke-width:2; }
    .flow { fill:#fff1bf; stroke:#3f4650; stroke-width:2; }
    .dit { fill:#f7b900; stroke:#3f4650; stroke-width:2; }
    .tokV { fill:#b985f4; stroke:#3f4650; stroke-width:1; }
    .tokT { fill:#0867c9; stroke:#3f4650; stroke-width:1; }
    .tokS { fill:#ef6f6c; stroke:#3f4650; stroke-width:1; }
    .tokA { fill:#ffe6b8; stroke:#3f4650; stroke-width:1; }
    .tokO { fill:#ff9800; stroke:#3f4650; stroke-width:1; }
    .arrow { stroke:#3f4650; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
    .dash { stroke:#3f4650; stroke-width:1.8; fill:none; stroke-dasharray:6 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#3f4650"/>
    </marker>
  </defs>

  <text x="730" y="42" text-anchor="middle" font-size="29" font-weight="700">GR00T N1.7: Cosmos/Qwen Backbone + Flow-Matching AlternateVLDiT Action Head</text>

  <!-- Backbone lane -->
  <text x="52" y="92" font-size="19" font-weight="700">Backbone inputs</text>
  <rect x="54" y="112" width="170" height="112" fill="#e5e7eb" stroke="#000" stroke-width="2"/>
  <path d="M70 206 L110 158 L136 182 L162 154 L206 206 Z" fill="#9ca3af" stroke="#000"/>
  <circle cx="92" cy="144" r="12" fill="#f59e0b" stroke="#000"/>
  <text x="139" y="254" text-anchor="middle" font-size="16">images / video</text>
  <text x="139" y="312" text-anchor="middle" font-size="15" font-family="monospace">instruction text</text>

  <rect x="282" y="102" width="154" height="92" rx="16" class="box"/>
  <text x="359" y="138" text-anchor="middle" font-size="18">processor</text>
  <text x="359" y="164" text-anchor="middle" font-size="14">crop / resize / formalize</text>
  <rect x="282" y="232" width="154" height="92" rx="16" class="box"/>
  <text x="359" y="268" text-anchor="middle" font-size="18">tokenizer</text>
  <text x="359" y="294" text-anchor="middle" font-size="14">language tokens</text>

  <rect x="500" y="104" width="180" height="220" rx="22" class="vlm"/>
  <text x="590" y="188" text-anchor="middle" font-size="20">Cosmos-Reason2</text>
  <text x="590" y="216" text-anchor="middle" font-size="20">Qwen3-VL</text>
  <text x="590" y="246" text-anchor="middle" font-size="15">select hidden layer</text>
  <text x="642" y="136" font-size="28">❄</text>

  <g>
    <rect x="462" y="122" width="14" height="16" class="tokV"/><rect x="462" y="144" width="14" height="16" class="tokV"/><rect x="462" y="166" width="14" height="16" class="tokV"/><rect x="462" y="188" width="14" height="16" class="tokV"/>
    <rect x="462" y="246" width="14" height="16" class="tokT"/><rect x="462" y="268" width="14" height="16" class="tokT"/><rect x="462" y="290" width="14" height="16" class="tokT"/>
    <rect x="704" y="160" width="14" height="16" class="tokV"/><rect x="704" y="182" width="14" height="16" class="tokV"/><rect x="704" y="204" width="14" height="16" class="tokT"/><rect x="704" y="226" width="14" height="16" class="tokT"/>
  </g>

  <rect x="760" y="132" width="148" height="72" rx="14" class="box"/>
  <text x="834" y="162" text-anchor="middle" font-size="17">VLLN</text>
  <text x="834" y="185" text-anchor="middle" font-size="13">LayerNorm on V/L</text>
  <rect x="760" y="238" width="148" height="86" rx="14" class="box"/>
  <text x="834" y="272" text-anchor="middle" font-size="17">optional V/L</text>
  <text x="834" y="296" text-anchor="middle" font-size="17">self-attention</text>

  <!-- Action head lane -->
  <line x1="40" y1="368" x2="1420" y2="368" stroke="#d1d5db" stroke-width="2"/>
  <text x="52" y="404" font-size="19" font-weight="700">Action head inputs</text>

  <text x="74" y="470" font-size="18">state history</text>
  <rect x="210" y="428" width="98" height="78" rx="12" fill="#fff" stroke="#3f4650" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="259" y="461" text-anchor="middle" font-size="17" font-style="italic">q<tspan baseline-shift="sub" font-size="12">t-k:t</tspan></text>
  <rect x="356" y="418" width="168" height="96" rx="16" class="emb"/>
  <text x="440" y="456" text-anchor="middle" font-size="18">CategorySpecific</text>
  <text x="440" y="482" text-anchor="middle" font-size="18">State Encoder</text>
  <text x="440" y="504" text-anchor="middle" font-size="13">embodiment_id</text>
  <rect x="558" y="454" width="15" height="17" class="tokS"/><rect x="558" y="478" width="15" height="17" class="tokS"/>

  <text x="66" y="610" font-size="18">flow noised action</text>
  <rect x="210" y="548" width="98" height="136" rx="12" fill="#fff" stroke="#3f4650" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="259" y="588" text-anchor="middle" font-size="17" font-style="italic">x<tspan baseline-shift="sub" font-size="12">t</tspan></text>
  <text x="259" y="628" text-anchor="middle" font-size="19">...</text>
  <text x="259" y="662" text-anchor="middle" font-size="15">H x action_dim</text>
  <rect x="356" y="548" width="168" height="124" rx="16" class="emb"/>
  <text x="440" y="590" text-anchor="middle" font-size="18">MultiEmbodiment</text>
  <text x="440" y="616" text-anchor="middle" font-size="18">Action Encoder</text>
  <text x="440" y="642" text-anchor="middle" font-size="13">action + time bucket</text>
  <g><rect x="558" y="558" width="15" height="17" class="tokA"/><rect x="558" y="581" width="15" height="17" class="tokA"/><rect x="558" y="604" width="15" height="17" class="tokA"/><rect x="558" y="627" width="15" height="17" class="tokA"/><rect x="558" y="650" width="15" height="17" class="tokA"/></g>

  <rect x="620" y="424" width="112" height="66" rx="12" class="flow"/>
  <text x="676" y="452" text-anchor="middle" font-size="15">position</text>
  <text x="676" y="474" text-anchor="middle" font-size="15">embedding</text>
  <rect x="620" y="546" width="112" height="86" rx="12" class="flow"/>
  <text x="676" y="578" text-anchor="middle" font-size="15">Beta time</text>
  <text x="676" y="600" text-anchor="middle" font-size="15">bucket</text>
  <text x="676" y="621" text-anchor="middle" font-size="13">α=1.5 β=1</text>

  <rect x="790" y="430" width="360" height="206" rx="22" class="dit"/>
  <text x="970" y="410" text-anchor="middle" font-size="18" font-weight="700">AlternateVLDiT / DiT</text>
  <rect x="822" y="462" width="68" height="128" rx="8" fill="#d9d9d9" stroke="#3f4650" stroke-width="2"/>
  <text x="856" y="530" text-anchor="middle" font-size="15" transform="rotate(90 856 530)">cross-attn to V/L</text>
  <rect x="914" y="462" width="68" height="128" rx="8" fill="#d9d9d9" stroke="#3f4650" stroke-width="2"/>
  <text x="948" y="530" text-anchor="middle" font-size="15" transform="rotate(90 948 530)">self-attn on S/A</text>
  <rect x="1006" y="462" width="68" height="128" rx="8" fill="#d9d9d9" stroke="#3f4650" stroke-width="2"/>
  <text x="1040" y="530" text-anchor="middle" font-size="15" transform="rotate(90 1040 530)">AdaNorm + MLP</text>
  <text x="970" y="622" text-anchor="middle" font-size="14">image_mask + backbone_attention_mask enter AlternateVLDiT</text>

  <g><rect x="1188" y="484" width="15" height="17" class="tokO"/><rect x="1188" y="507" width="15" height="17" class="tokO"/><rect x="1188" y="530" width="15" height="17" class="tokO"/><rect x="1188" y="553" width="15" height="17" class="tokO"/></g>
  <rect x="1232" y="470" width="158" height="108" rx="16" class="emb"/>
  <text x="1311" y="510" text-anchor="middle" font-size="18">CategorySpecific</text>
  <text x="1311" y="536" text-anchor="middle" font-size="18">Action Decoder</text>
  <text x="1311" y="558" text-anchor="middle" font-size="13">velocity actions-noise</text>

  <!-- Equations -->
  <rect x="970" y="98" width="360" height="152" rx="16" class="flow"/>
  <text x="1150" y="132" text-anchor="middle" font-size="17" font-weight="700">Flow matching objective</text>
  <text x="1150" y="164" text-anchor="middle" font-size="16">t ~ (1 - Beta(1.5, 1.0)) · noise_s</text>
  <text x="1150" y="192" text-anchor="middle" font-size="16">x<tspan baseline-shift="sub" font-size="12">t</tspan> = (1 - t) · noise + t · action</text>
  <text x="1150" y="220" text-anchor="middle" font-size="16">target v = action - noise</text>

  <!-- Legend -->
  <rect x="1000" y="292" width="30" height="30" rx="5" class="emb"/><text x="1046" y="314" font-size="16">embodiment-specific trainable modules</text>
  <text x="1002" y="356" font-size="27">❄</text><text x="1046" y="354" font-size="16">frozen or mostly frozen backbone</text>

  <!-- arrows -->
  <path class="arrow" d="M224 150 H282"/><path class="arrow" d="M224 278 H282"/>
  <path class="arrow" d="M436 148 H462"/><path class="arrow" d="M436 278 H462"/><path class="arrow" d="M680 214 H704"/><path class="arrow" d="M718 214 H760"/>
  <path class="arrow" d="M908 166 C944 166, 934 458, 790 486"/>
  <path class="arrow" d="M308 468 H356"/><path class="arrow" d="M524 468 H558"/><path class="arrow" d="M573 468 H620"/>
  <path class="arrow" d="M308 616 H356"/><path class="arrow" d="M524 616 H558"/><path class="arrow" d="M573 616 H620"/>
  <path class="arrow" d="M732 462 C760 462, 760 500, 790 500"/>
  <path class="arrow" d="M732 590 H790"/>
  <path class="arrow" d="M1150 524 H1188"/><path class="arrow" d="M1203 524 H1232"/>
  <path class="dash" d="M1311 578 V760 H259 V684"/>
  <text x="744" y="792" text-anchor="middle" font-size="17">Inference: initialize action chunk with Gaussian noise, run K Euler flow steps, decode motor actions</text>
</svg>
