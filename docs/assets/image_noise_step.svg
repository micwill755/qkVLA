<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Gaussian noise added to a tiny image</title>
  <desc id="desc">A diagram showing a clean two by two image, matching Gaussian noise, and the resulting noisy image.</desc>
  <rect width="980" height="520" fill="#ffffff"/>

  <text x="42" y="48" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#000000">
    Tiny image noise step
  </text>

  <g transform="translate(46 92)">
    <rect x="0" y="0" width="250" height="280" rx="10" fill="#fff3b0" stroke="#000000" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#000000">
      clean image x_0
    </text>
    <text x="24" y="68" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#000000">
      shape = 1 x 2 x 2
    </text>

    <g transform="translate(45 92)">
      <rect x="0" y="0" width="72" height="72" fill="#d9d9d9" stroke="#000000" stroke-width="2"/>
      <rect x="72" y="0" width="72" height="72" fill="#404040" stroke="#000000" stroke-width="2"/>
      <rect x="0" y="72" width="72" height="72" fill="#808080" stroke="#000000" stroke-width="2"/>
      <rect x="72" y="72" width="72" height="72" fill="#f0f0f0" stroke="#000000" stroke-width="2"/>
      <text x="36" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#000000">0.20</text>
      <text x="108" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">0.80</text>
      <text x="36" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">0.50</text>
      <text x="108" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#000000">0.10</text>
    </g>
  </g>

  <text x="324" y="244" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#000000">
    +
  </text>

  <g transform="translate(374 92)">
    <rect x="0" y="0" width="260" height="280" rx="10" fill="#fff3b0" stroke="#000000" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#000000">
      scaled noise
    </text>
    <text x="24" y="68" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#000000">
      0.10 * epsilon
    </text>

    <g transform="translate(58 92)">
      <rect x="0" y="0" width="72" height="72" fill="#ffd76a" stroke="#000000" stroke-width="2"/>
      <rect x="72" y="0" width="72" height="72" fill="#f2a000" stroke="#000000" stroke-width="2"/>
      <rect x="0" y="72" width="72" height="72" fill="#ffd76a" stroke="#000000" stroke-width="2"/>
      <rect x="72" y="72" width="72" height="72" fill="#ffd76a" stroke="#000000" stroke-width="2"/>
      <text x="36" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#000000">+0.03</text>
      <text x="108" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#000000">-0.12</text>
      <text x="36" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#000000">+0.01</text>
      <text x="108" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#000000">+0.07</text>
    </g>

    <text x="34" y="258" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#000000">
      epsilon has the same
    </text>
    <text x="34" y="276" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#000000">
      1 x 2 x 2 shape
    </text>
  </g>

  <text x="662" y="244" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#000000">
    =
  </text>

  <g transform="translate(714 92)">
    <rect x="0" y="0" width="220" height="280" rx="10" fill="#fff3b0" stroke="#000000" stroke-width="2"/>
    <text x="24" y="40" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#000000">
      noisy image
    </text>
    <text x="24" y="68" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#000000">
      same shape
    </text>

    <g transform="translate(38 92)">
      <rect x="0" y="0" width="72" height="72" fill="#d1d1d1" stroke="#000000" stroke-width="2"/>
      <rect x="72" y="0" width="72" height="72" fill="#525252" stroke="#000000" stroke-width="2"/>
      <rect x="0" y="72" width="72" height="72" fill="#7d7d7d" stroke="#000000" stroke-width="2"/>
      <rect x="72" y="72" width="72" height="72" fill="#d4d4d4" stroke="#000000" stroke-width="2"/>
      <text x="36" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#000000">0.23</text>
      <text x="108" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">0.68</text>
      <text x="36" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#ffffff">0.51</text>
      <text x="108" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#000000">0.17</text>
    </g>
  </g>

  <g transform="translate(125 416)">
    <rect x="0" y="0" width="730" height="54" rx="8" fill="#fff3b0" stroke="#000000" stroke-width="2"/>
    <text x="24" y="35" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#000000">
      x_noisy = x_0 + 0.10 * epsilon, applied once per pixel
    </text>
  </g>
</svg>
