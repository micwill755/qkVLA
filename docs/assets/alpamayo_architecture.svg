<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 860" role="img" aria-labelledby="title desc">
  <title id="title">Alpamayo public architecture path</title>
  <desc id="desc">Detailed Alpamayo architecture showing phase one reasoning VLA producing chain-of-causation text and prompt cache, and phase two expert denoiser using action in projection, expert transformer, action out projection, action space, and diffusion sampling loop.</desc>
  <rect width="1460" height="860" fill="#ffffff"/>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill:#000; }
    .box { fill:#f2f2f2; stroke:#3f4650; stroke-width:2; }
    .vlm { fill:#e9edf7; stroke:#3f4650; stroke-width:2; }
    .expert { fill:#f7b900; stroke:#3f4650; stroke-width:2; }
    .train { fill:#d9ead3; stroke:#3f4650; stroke-width:2; }
    .flow { fill:#fff1bf; stroke:#3f4650; stroke-width:2; }
    .tokV { fill:#b985f4; stroke:#3f4650; stroke-width:1; }
    .tokT { fill:#0867c9; stroke:#3f4650; stroke-width:1; }
    .tokE { fill:#ef6f6c; stroke:#3f4650; stroke-width:1; }
    .tokA { fill:#ffe6b8; stroke:#3f4650; stroke-width:1; }
    .tokO { fill:#ff9800; stroke:#3f4650; stroke-width:1; }
    .arrow { stroke:#3f4650; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
    .dash { stroke:#3f4650; stroke-width:1.8; fill:none; stroke-dasharray:6 6; }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#3f4650"/></marker></defs>

  <text x="730" y="42" text-anchor="middle" font-size="29" font-weight="700">Alpamayo: Reasoning VLA + Split Expert Denoiser for Trajectory Planning</text>

  <!-- Phase headers -->
  <rect x="40" y="72" width="1380" height="330" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <rect x="40" y="430" width="1380" height="370" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="62" y="106" font-size="20" font-weight="700">Phase 1: reasoning VLA builds context and Chain-of-Causation output</text>
  <text x="62" y="464" font-size="20" font-weight="700">Phase 2: diffusion / flow expert denoises future trajectory tokens</text>

  <!-- Phase 1 inputs -->
  <rect x="70" y="130" width="160" height="94" fill="#e5e7eb" stroke="#000" stroke-width="2"/>
  <path d="M84 208 L122 164 L148 188 L176 160 L216 208 Z" fill="#9ca3af" stroke="#000"/>
  <text x="150" y="252" text-anchor="middle" font-size="16">multi-camera frames</text>
  <rect x="70" y="286" width="160" height="56" rx="8" fill="#fff" stroke="#3f4650" stroke-width="2"/>
  <text x="150" y="320" text-anchor="middle" font-size="15">navigation prompt</text>

  <rect x="285" y="136" width="142" height="76" rx="14" class="box"/>
  <text x="356" y="168" text-anchor="middle" font-size="17">vision</text>
  <text x="356" y="191" text-anchor="middle" font-size="17">processor</text>
  <rect x="285" y="276" width="142" height="76" rx="14" class="box"/>
  <text x="356" y="308" text-anchor="middle" font-size="17">text</text>
  <text x="356" y="331" text-anchor="middle" font-size="17">tokenizer</text>

  <g><rect x="464" y="142" width="14" height="16" class="tokV"/><rect x="464" y="164" width="14" height="16" class="tokV"/><rect x="464" y="186" width="14" height="16" class="tokV"/>
     <rect x="464" y="284" width="14" height="16" class="tokT"/><rect x="464" y="306" width="14" height="16" class="tokT"/><rect x="464" y="328" width="14" height="16" class="tokT"/></g>

  <rect x="525" y="142" width="190" height="182" rx="22" class="vlm"/>
  <text x="620" y="210" text-anchor="middle" font-size="20">Reasoning VLA</text>
  <text x="620" y="238" text-anchor="middle" font-size="17">Cosmos / VLM</text>
  <text x="620" y="266" text-anchor="middle" font-size="14">base_model_prefix = vlm</text>
  <text x="678" y="172" font-size="28">❄</text>

  <rect x="790" y="112" width="260" height="108" rx="14" fill="#fff" stroke="#3f4650" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="920" y="148" text-anchor="middle" font-size="18">Chain-of-Causation</text>
  <text x="920" y="174" text-anchor="middle" font-size="15">reasoning text / meta action</text>
  <text x="920" y="198" text-anchor="middle" font-size="14">used for interpretation + conditioning</text>

  <rect x="790" y="262" width="260" height="88" rx="14" class="train"/>
  <text x="920" y="296" text-anchor="middle" font-size="18">prompt cache</text>
  <text x="920" y="322" text-anchor="middle" font-size="14">position_ids + attention_mask + KV</text>

  <rect x="1110" y="176" width="220" height="96" rx="14" class="flow"/>
  <text x="1220" y="210" text-anchor="middle" font-size="17">Expert config</text>
  <text x="1220" y="235" text-anchor="middle" font-size="14">copy VLM text_config</text>
  <text x="1220" y="258" text-anchor="middle" font-size="14">delete embed_tokens</text>

  <!-- Phase 2 action space and denoiser -->
  <rect x="70" y="496" width="190" height="102" rx="14" class="train"/>
  <text x="165" y="534" text-anchor="middle" font-size="17">ActionSpace</text>
  <text x="165" y="558" text-anchor="middle" font-size="14">trajectory ↔ action</text>
  <text x="165" y="580" text-anchor="middle" font-size="14">e.g. accel/curvature</text>

  <rect x="70" y="650" width="92" height="120" rx="12" fill="#fff" stroke="#3f4650" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="116" y="690" text-anchor="middle" font-size="18">x<tspan baseline-shift="sub" font-size="12">t</tspan></text>
  <text x="116" y="724" text-anchor="middle" font-size="18">...</text>
  <text x="116" y="752" text-anchor="middle" font-size="15">future</text>
  <rect x="205" y="650" width="72" height="120" rx="12" fill="#fff" stroke="#3f4650" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="241" y="704" text-anchor="middle" font-size="18">t</text>
  <text x="241" y="730" text-anchor="middle" font-size="14">step</text>

  <rect x="330" y="628" width="168" height="122" rx="16" class="train"/>
  <text x="414" y="674" text-anchor="middle" font-size="18">action_in_proj</text>
  <text x="414" y="700" text-anchor="middle" font-size="14">future token embeds</text>
  <text x="414" y="724" text-anchor="middle" font-size="14">from x and t</text>
  <g><rect x="534" y="650" width="14" height="16" class="tokA"/><rect x="534" y="672" width="14" height="16" class="tokA"/><rect x="534" y="694" width="14" height="16" class="tokA"/><rect x="534" y="716" width="14" height="16" class="tokA"/></g>

  <rect x="605" y="585" width="320" height="164" rx="22" class="expert"/>
  <text x="765" y="565" text-anchor="middle" font-size="18" font-weight="700">Expert AutoModel from text_config</text>
  <rect x="640" y="616" width="70" height="96" rx="8" fill="#d9d9d9" stroke="#3f4650" stroke-width="2"/>
  <text x="675" y="668" text-anchor="middle" font-size="15" transform="rotate(90 675 668)">self-attn</text>
  <rect x="742" y="616" width="70" height="96" rx="8" fill="#d9d9d9" stroke="#3f4650" stroke-width="2"/>
  <text x="777" y="668" text-anchor="middle" font-size="15" transform="rotate(90 777 668)">prompt KV</text>
  <rect x="844" y="616" width="48" height="96" rx="8" fill="#d9d9d9" stroke="#3f4650" stroke-width="2"/>
  <text x="868" y="668" text-anchor="middle" font-size="15" transform="rotate(90 868 668)">MLP</text>

  <g><rect x="962" y="636" width="14" height="16" class="tokO"/><rect x="962" y="658" width="14" height="16" class="tokO"/><rect x="962" y="680" width="14" height="16" class="tokO"/><rect x="962" y="702" width="14" height="16" class="tokO"/></g>
  <rect x="1018" y="626" width="150" height="110" rx="16" class="train"/>
  <text x="1093" y="668" text-anchor="middle" font-size="18">action_out_proj</text>
  <text x="1093" y="694" text-anchor="middle" font-size="14">last future tokens</text>

  <path d="M1212 690 C1248 644, 1280 626, 1334 606" stroke="#000" stroke-width="4" fill="none"/>
  <path d="M1212 690 C1254 694, 1288 706, 1340 728" stroke="#000" stroke-width="3" fill="none" stroke-dasharray="6 6"/>
  <text x="1274" y="778" text-anchor="middle" font-size="18">64-waypoint trajectory</text>

  <rect x="1030" y="456" width="296" height="104" rx="14" class="flow"/>
  <text x="1178" y="492" text-anchor="middle" font-size="17" font-weight="700">sampling modes</text>
  <text x="1178" y="520" text-anchor="middle" font-size="15">native PyTorch expert or TRT expert_step</text>
  <text x="1178" y="544" text-anchor="middle" font-size="15">5 or 10 diffusion / flow steps</text>

  <!-- arrows phase 1 -->
  <path class="arrow" d="M230 178 H285"/><path class="arrow" d="M230 314 H285"/>
  <path class="arrow" d="M427 174 H464"/><path class="arrow" d="M427 314 H464"/><path class="arrow" d="M478 234 H525"/>
  <path class="arrow" d="M715 190 H790"/><path class="arrow" d="M715 272 C748 280, 748 304, 790 306"/><path class="arrow" d="M1050 306 C1096 306, 1085 240, 1110 224"/>

  <!-- arrows phase 2 -->
  <path class="arrow" d="M260 548 C296 548, 296 660, 330 678"/>
  <path class="arrow" d="M162 710 H205"/><path class="arrow" d="M277 710 H330"/>
  <path class="arrow" d="M498 692 H534"/><path class="arrow" d="M548 692 H605"/>
  <path class="arrow" d="M920 306 C962 356, 742 522, 742 585"/>
  <path class="arrow" d="M925 680 H962"/><path class="arrow" d="M976 680 H1018"/><path class="arrow" d="M1168 680 C1190 680, 1192 688, 1212 690"/>
  <path class="dash" d="M1274 728 V832 H116 V770"/>
  <text x="730" y="846" text-anchor="middle" font-size="17">Diffusion loop repeatedly calls: action_in_proj(x,t) → expert(prompt cache) → action_out_proj</text>
</svg>
