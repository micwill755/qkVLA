<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" role="img" aria-labelledby="title desc">
  <title id="title">Bell-shaped distribution</title>
  <desc id="desc">A yellow bell curve with a thick black outline, a center line, and labels for frequency and value.</desc>
  <rect width="860" height="520" fill="#ffffff"/>

  <line x1="80" y1="430" x2="800" y2="430" stroke="#000000" stroke-width="3"/>
  <line x1="80" y1="430" x2="80" y2="74" stroke="#000000" stroke-width="3"/>
  <path d="M800 430 L786 422 L786 438 Z" fill="#000000"/>
  <path d="M80 74 L72 88 L88 88 Z" fill="#000000"/>

  <text x="812" y="438" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#000000">value</text>
  <text x="28" y="62" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#000000">frequency</text>

  <path
    d="M92 430
       C160 422, 205 390, 250 326
       C302 252, 340 92, 430 92
       C520 92, 558 252, 610 326
       C655 390, 700 422, 768 430
       Z"
    fill="#ffd400"/>
  <path
    d="M92 430
       C160 422, 205 390, 250 326
       C302 252, 340 92, 430 92
       C520 92, 558 252, 610 326
       C655 390, 700 422, 768 430"
    fill="none"
    stroke="#000000"
    stroke-width="10"
    stroke-linecap="round"/>

  <line x1="430" y1="92" x2="430" y2="455" stroke="#000000" stroke-width="4"/>
  <text x="430" y="62" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#000000">
    most samples near centre
  </text>
  <text x="430" y="488" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#000000">
    center
  </text>
</svg>
